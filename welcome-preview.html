<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>欢迎页预览</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;cursor:none}
body{background:#d4d4d8;font-family:"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;user-select:none}
.bg-dots{position:fixed;inset:0;background-image:radial-gradient(circle,#aaa 1.2px,transparent 1.2px);background-size:20px 20px;pointer-events:none}
/* Cursor with backdrop-filter - inverts everything behind it */
.cursor{position:fixed;width:140px;height:140px;border-radius:50%;pointer-events:none;z-index:100;transform:translate(-50%,-50%);background:#fff;mix-blend-mode:difference;isolation:isolate}
/* English overlay - ABOVE cursor so backdrop-filter doesn't affect it */
.eng-overlay{position:fixed;inset:0;pointer-events:none;z-index:110;clip-path:circle(0px at -100px -100px);background:#2b2b27}
.eng-overlay .en-text{font-size:clamp(2.2rem,5vw,3.5rem);font-weight:900;letter-spacing:2px;color:#fff;white-space:nowrap}
.en-text{position:fixed;pointer-events:none;z-index:200;display:none;font-weight:900;letter-spacing:2px;color:#fff;white-space:nowrap;transform:translate(-50%,-50%)}
.center{text-align:center;z-index:110;position:relative}
.zh{font-size:clamp(2.2rem,5vw,3.5rem);font-weight:900;letter-spacing:4px;color:#222}
.sig{font-size:clamp(.9rem,2vw,1.1rem);color:#555;margin-top:20px;letter-spacing:2px;font-weight:300}
.btns{display:flex;gap:16px;justify-content:center;margin-top:50px}
.btn{padding:14px 40px;border-radius:50px;font-size:.9rem;font-weight:600;cursor:pointer;border:1.5px solid #222;background:transparent;color:#222;transition:all .3s;letter-spacing:1px}
.btn:hover{background:#222;color:#fff}.btn.p{background:#222;color:#fff}.btn.p:hover{background:#444}
@media(max-width:600px){.cursor{width:90px;height:90px}.zh{font-size:1.8rem}}
</style></head><body>
<div class="bg-dots"></div>
<div class="cursor" id="c"></div>
<!-- English reveal layer - above cursor, clipped to circle -->
<div class="eng-overlay" id="eng"></div>
<div class="en-text" id="enText">你好，我是 笺事语阑</div>
<div style="display:flex;flex-direction:column;align-items:center">
<div class="center" style="z-index:110;position:relative"><div class="zh" id="zhText">Hello, I'm Js1Lan</div></div>
<div class="center"><div class="sig">准备得太久，你就没有办法开始</div>
<div class="btns"><button class="btn p">阅读博客</button><button class="btn">游戏板块</button></div></div>
</div>
<script>
var c=document.getElementById('c'),eng=document.getElementById('eng'),et=document.getElementById('enText'),zh=document.getElementById('zhText');
function updateEng(mx,my){
  var r=zh.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  var dist=Math.sqrt((mx-cx)*(mx-cx)+(my-cy)*(my-cy));
  if(dist<150){
    eng.style.clipPath='circle(70px at '+mx+'px '+my+'px)';
    et.style.display='block';et.style.left=mx+'px';et.style.top=my+'px';
    et.style.fontSize=window.getComputedStyle(zh).fontSize;
  }else{eng.style.clipPath='circle(0px at -100px -100px)';et.style.display='none'}
}
document.addEventListener('mousemove',function(e){c.style.left=e.clientX+'px';c.style.top=e.clientY+'px';updateEng(e.clientX,e.clientY)});
</script></body></html>
