<!DOCTYPE html><html lang="zh-CN" data-theme="dark"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>音乐播放器预览</title>
<style>
:root{--font:system-ui,"PingFang SC",sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030712;font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.player{width:280px;padding:22px 18px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.05);backdrop-filter:blur(40px);border-radius:32px;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.cover{width:100%;aspect-ratio:1;border-radius:16px;background:linear-gradient(135deg,rgba(6,182,212,.08),rgba(217,70,239,.06));margin-bottom:14px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.cover img{width:100%;height:100%;object-fit:cover}
.cover .eq{position:absolute;bottom:14px;display:flex;gap:3px;align-items:flex-end;height:28px}
.cover .eq span{width:3px;border-radius:2px;background:#d946ef;animation:eq .8s ease-in-out infinite alternate}
.cover .eq span:nth-child(1){animation-delay:0s;height:16px}.cover .eq span:nth-child(2){animation-delay:.15s;height:26px}.cover .eq span:nth-child(3){animation-delay:.3s;height:20px}.cover .eq span:nth-child(4){animation-delay:.45s;height:28px}.cover .eq span:nth-child(5){animation-delay:.6s;height:14px}.cover .eq span:nth-child(6){animation-delay:.75s;height:22px}
@keyframes eq{0%{transform:scaleY(.4)}100%{transform:scaleY(1)}}
.cover .eq.off span{animation-play-state:paused}
.info{text-align:center;margin-bottom:12px}
.info .title{font-size:.82rem;font-weight:700;color:#f1f5f9;margin-bottom:2px}
.info .artist{font-size:.64rem;color:#64748b}
/* Progress */
.prog{width:100%;margin-bottom:10px}
.prog input{width:100%;height:3px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.06);border-radius:2px;outline:none;cursor:pointer}
.prog input::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#d946ef;cursor:pointer}
/* Controls - glass circles */
.ctrls{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}
.ctrl-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);color:#94a3b8;transition:all .25s;backdrop-filter:blur(10px)}
.ctrl-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.14);color:#f1f5f9;transform:scale(1.06)}
.ctrl-btn:active{transform:scale(.95)}
.ctrl-btn svg{width:16px;height:16px}
.ctrl-btn.play{width:50px;height:50px;background:linear-gradient(135deg,#d946ef,#06b6d4);color:#fff;border:none;box-shadow:0 0 20px rgba(217,70,239,.15)}
.ctrl-btn.play:hover{box-shadow:0 0 30px rgba(217,70,239,.3);transform:scale(1.1)}
.ctrl-btn.play svg{width:20px;height:20px}
/* Volume row */
.vol-row{display:flex;align-items:center;justify-content:center;gap:8px}
.vol-row svg{width:14px;height:14px;color:#64748b;flex-shrink:0}
.vol-row input{width:70px;height:3px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.06);border-radius:2px;outline:none;cursor:pointer}
.vol-row input::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#06b6d4;cursor:pointer}
/* Playlist */
.plist-wrap{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:12px;padding:10px 12px;margin-top:10px}
.plist-title{font-size:.68rem;font-weight:600;color:#d946ef;letter-spacing:1px;margin-bottom:8px}
.plist-item{font-size:.66rem;padding:5px 8px;border-radius:6px;cursor:pointer;color:#64748b;transition:all .2s;display:flex;justify-content:space-between;margin:2px 0}
.plist-item:hover,.plist-item.on{color:#d946ef;background:rgba(217,70,239,.08)}
</style></head><body>
<div class="player">
<div class="cover"><div class="eq"><span></span><span></span><span></span><span></span><span></span><span></span></div></div>
<div class="info"><div class="title">夜曲</div><div class="artist">周杰伦</div></div>
<div class="prog"><input type="range" min="0" max="100" value="45"></div>
<div class="ctrls">
<button class="ctrl-btn" title="上一曲"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
<button class="ctrl-btn play" title="播放"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 3 20 12 6 21 6 3"/></svg></button>
<button class="ctrl-btn" title="下一曲"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
<button class="ctrl-btn" title="循环模式"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></button>
</div>
<div class="vol-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg><input type="range" min="0" max="100" value="30"></div>
<div class="plist-wrap"><div class="plist-title">待播放歌曲</div>
<div class="plist-item on">夜曲<span style="font-size:.58rem;color:#64748b">周杰伦</span></div>
<div class="plist-item">晴天<span style="font-size:.58rem;color:#64748b">周杰伦</span></div>
<div class="plist-item">稻香<span style="font-size:.58rem;color:#64748b">周杰伦</span></div>
</div>
</div>
</body></html>
